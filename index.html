<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0e14">
<title>Gryning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@200;300;400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-a: #0b0e14;
    --bg-b: #0b0e14;
    --glow: rgba(232, 184, 114, 0);
    --ink: #e6e1d8;
    --ink-dim: #8b93a7;
    --ink-faint: #545b6b;
    --amber: #e8b872;
    --line: rgba(139, 147, 167, 0.16);
    --card: rgba(139, 147, 167, 0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg-a);
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  #sky {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 100%);
    transition: background 60s linear;
    z-index: -2;
  }

  #glow {
    position: fixed;
    left: 50%;
    bottom: -40vh;
    width: 130vw;
    height: 80vh;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, var(--glow) 0%, transparent 65%);
    transition: opacity 60s linear;
    z-index: -1;
    pointer-events: none;
  }

  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 4vmin 5vmin;
    gap: 2.5vmin;
    transition: opacity 1.2s ease;
  }

  /* ---------- header: clock ---------- */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 3vmin;
    flex-wrap: wrap;
  }

  #clock {
    font-family: 'Inter Tight', 'Inter', sans-serif;
    font-weight: 200;
    font-size: clamp(64px, 17vmin, 190px);
    line-height: 0.95;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }

  #clock .sec {
    font-size: 0.28em;
    font-weight: 300;
    color: var(--ink-faint);
    letter-spacing: 0;
  }

  #dateblock {
    text-align: right;
    padding-top: 1.6vmin;
    flex: 1 1 12ch;
    min-width: 0;
    overflow: hidden;
  }

  #date, #nameday { overflow-wrap: break-word; }

  #date {
    font-size: clamp(15px, 2.8vmin, 26px);
    font-weight: 500;
    text-transform: capitalize;
  }

  #nameday {
    margin-top: 0.8vmin;
    font-size: clamp(12px, 2.1vmin, 19px);
    color: var(--ink-dim);
  }

  #nameday .red {
    color: var(--amber);
    font-weight: 600;
  }

  /* ---------- weather ---------- */
  #weather {
    display: flex;
    align-items: center;
    gap: 4vmin;
    flex-wrap: wrap;
  }

  #wx-now {
    display: flex;
    align-items: baseline;
    gap: 1.5vmin;
  }

  #wx-temp {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 300;
    font-size: clamp(42px, 9vmin, 92px);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  #wx-desc {
    font-size: clamp(13px, 2.3vmin, 21px);
    color: var(--ink-dim);
    max-width: 24vmin;
    line-height: 1.3;
  }

  #wx-meta {
    display: flex;
    gap: 3.5vmin;
    font-size: clamp(12px, 2vmin, 18px);
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }

  #wx-meta b {
    display: block;
    color: var(--ink);
    font-weight: 500;
    font-size: 1.25em;
    margin-top: 0.3vmin;
  }

  #wx-hours {
    display: flex;
    gap: 0;
    margin-left: auto;
    border-left: 1px solid var(--line);
    padding-left: 2vmin;
  }

  .hour {
    text-align: center;
    padding: 0 1.6vmin;
    font-variant-numeric: tabular-nums;
  }

  .hour .h { font-size: clamp(10px, 1.7vmin, 15px); color: var(--ink-faint); }
  .hour .i { font-size: clamp(16px, 3vmin, 28px); margin: 0.5vmin 0; }
  .hour .t { font-size: clamp(12px, 2vmin, 18px); font-weight: 500; }

  /* ---------- middle: trains + f1 ---------- */
  #row2 {
    display: flex;
    gap: 2.5vmin;
    flex-wrap: wrap;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 2.2vmin 2.6vmin;
  }

  .panel h2 {
    font-size: clamp(10px, 1.7vmin, 14px);
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 1.4vmin;
  }

  #trains { flex: 2 1 300px; }

  #train-list {
    display: flex;
    flex-direction: column;
    gap: 1vmin;
  }

  .dep {
    display: flex;
    align-items: baseline;
    gap: 2vmin;
    font-size: clamp(14px, 2.4vmin, 22px);
    font-variant-numeric: tabular-nums;
  }

  .dep .when {
    font-weight: 600;
    min-width: 5.5ch;
    color: var(--amber);
  }

  .dep .when.later { color: var(--ink); }
  .dep .dest { color: var(--ink-dim); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dep .line-badge {
    font-size: 0.72em;
    font-weight: 600;
    color: var(--ink-faint);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 0.1em 0.5em;
  }

  #f1 { flex: 1 1 220px; }

  /* elpris */
  #elpris { flex: 1 1 220px; display: flex; flex-direction: column; }

  #el-now {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 300;
    font-size: clamp(22px, 4.4vmin, 40px);
    font-variant-numeric: tabular-nums;
  }

  #el-now .unit { font-size: 0.45em; color: var(--ink-dim); font-weight: 400; }

  #el-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 7vmin;
    min-height: 34px;
    margin: 1.4vmin 0 1vmin;
  }

  .el-bar {
    flex: 1;
    background: var(--ink-faint);
    opacity: 0.5;
    border-radius: 2px 2px 0 0;
  }

  .el-bar.now { background: var(--amber); opacity: 1; }
  .el-bar.cheap { background: #79a86b; opacity: 0.95; }

  #el-hint { font-size: clamp(11px, 1.9vmin, 16px); color: var(--ink-dim); font-variant-numeric: tabular-nums; }
  #el-hint b { color: #9cc48d; font-weight: 500; }

  /* f1 weekend sessions */
  .f1-session {
    display: flex;
    justify-content: space-between;
    gap: 2vmin;
    font-size: clamp(12px, 2.1vmin, 18px);
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    line-height: 1.5;
  }

  .f1-session.past { opacity: 0.35; }
  .f1-session.next { color: var(--ink); }
  .f1-session.next .st { color: var(--amber); font-weight: 600; }

  #f1 a.pitwall {
    display: inline-block;
    margin-top: 1.4vmin;
    font-size: clamp(11px, 1.9vmin, 15px);
    color: var(--amber);
    text-decoration: none;
    opacity: 0.9;
  }

  /* SL deviations */
  .deviation {
    display: flex;
    gap: 1.2vmin;
    margin-top: 1.4vmin;
    font-size: clamp(12px, 2vmin, 17px);
    color: var(--amber);
    line-height: 1.35;
  }

  .deviation::before { content: '⚠'; flex-shrink: 0; }

  #f1-body {
    font-size: clamp(14px, 2.4vmin, 22px);
    line-height: 1.45;
  }

  #f1-body .race { font-weight: 600; }
  #f1-body .count { color: var(--amber); font-weight: 600; font-variant-numeric: tabular-nums; }
  #f1-body .sub { color: var(--ink-dim); font-size: 0.82em; margin-top: 0.6vmin; }

  /* ---------- news ---------- */
  #news {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #news-sections {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(46vw, 420px), 1fr));
    gap: 2vmin 4.5vmin;
    overflow: hidden;
    align-content: start;
  }

  .news-col {
    min-width: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 1.5vmin;
  }

  .news-col h3 {
    font-size: clamp(10px, 1.6vmin, 13px);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0.75;
  }

  .headline {
    display: flex;
    align-items: baseline;
    gap: 1.8vmin;
    font-size: clamp(14px, 2.5vmin, 23px);
    line-height: 1.35;
    cursor: pointer;
  }

  .headline:active .txt { color: var(--amber); }

  .headline .src {
    font-size: 0.62em;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    min-width: 4.5ch;
    text-transform: uppercase;
  }

  .headline .txt {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .headline { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .headline:active .txt { color: var(--amber); }

  /* ---------- article popup ---------- */
  #modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(4, 6, 10, 0.72);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    z-index: 20;
    padding: 4vmin;
  }

  #modal.open { display: flex; }

  #modal-card {
    background: #141824;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 4vmin 4.5vmin;
    max-width: min(680px, 92vw);
    max-height: 78vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
  }

  #m-src {
    font-size: clamp(10px, 1.7vmin, 14px);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1.6vmin;
  }

  #m-title {
    font-size: clamp(18px, 3.4vmin, 30px);
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 2vmin;
  }

  #m-desc {
    font-size: clamp(14px, 2.4vmin, 20px);
    line-height: 1.55;
    color: var(--ink-dim);
  }

  #modal-actions {
    display: flex;
    gap: 2.5vmin;
    margin-top: 3vmin;
    align-items: center;
  }

  #m-link, #m-close {
    font: inherit;
    font-size: clamp(13px, 2.1vmin, 17px);
    font-weight: 500;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1.2vmin 2.4vmin;
    text-decoration: none;
    cursor: pointer;
  }

  #m-link { color: var(--amber); }

  /* ---------- footer status ---------- */
  footer {
    display: flex;
    justify-content: space-between;
    font-size: clamp(9px, 1.5vmin, 12px);
    color: var(--ink-faint);
    letter-spacing: 0.06em;
  }

  /* ---------- night mode ---------- */
  body.night #app > *:not(header) { opacity: 0; pointer-events: none; }
  body.night #dateblock { opacity: 0.35; }
  body.night #clock { color: #6a7080; }
  body.night { background: #000; }
  body.night #sky, body.night #glow { opacity: 0; }

  #app > *:not(header), #dateblock, #clock, #sky, #glow {
    transition: opacity 1.5s ease, color 1.5s ease;
  }

  .hidden { display: none !important; }

  @media (max-width: 700px) {
    #wx-hours { border-left: none; padding-left: 0; margin-left: 0; }
    #dateblock { text-align: left; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div id="sky"></div>
<div id="glow"></div>

<div id="app">
  <header>
    <div id="clock">--:--</div>
    <div id="dateblock">
      <div id="date"></div>
      <div id="nameday"></div>
    </div>
  </header>

  <div id="weather">
    <div id="wx-now">
      <div id="wx-temp">--°</div>
      <div id="wx-desc"></div>
    </div>
    <div id="wx-meta">
      <div>Högst / lägst<b id="wx-hilo">-- / --</b></div>
      <div>Regn idag<b id="wx-rain">--</b></div>
      <div>Sol upp<b id="wx-sunrise">--:--</b></div>
      <div>Sol ner<b id="wx-sunset">--:--</b></div>
    </div>
    <div id="wx-hours"></div>
  </div>

  <div id="row2">
    <div class="panel" id="trains">
      <h2>Pendeltåg · Jakobsberg</h2>
      <div id="train-list"><div class="dep"><span class="dest">Hämtar avgångar …</span></div></div>
      <div id="train-deviations"></div>
    </div>
    <div class="panel" id="elpris">
      <h2>Elpris · SE3</h2>
      <div id="el-now">--</div>
      <div id="el-bars"></div>
      <div id="el-hint"></div>
    </div>
    <div class="panel" id="f1">
      <h2>Nästa F1-race</h2>
      <div id="f1-body">Hämtar …</div>
    </div>
  </div>

  <div class="panel" id="news">
    <div id="news-sections"><div class="headline"><span class="txt">Hämtar rubriker …</span></div></div>
  </div>

  <footer>
    <span id="status">GRYNING</span>
    <span id="updated"></span>
  </footer>
</div>

<div id="modal">
  <div id="modal-card">
    <div id="m-src"></div>
    <div id="m-title"></div>
    <div id="m-desc"></div>
    <div id="modal-actions">
      <a id="m-link" href="#" target="_blank" rel="noopener">Öppna artikel ↗</a>
      <button id="m-close" type="button">Stäng</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   GRYNING — bedside morning dashboard
   Single file. No keys. No backend. GitHub Pages friendly.
   ============================================================ */

const CONFIG = {
  // Jakobsberg, Stockholm
  lat: 59.4229,
  lon: 17.8358,
  // SL station name to match (pendeltåg)
  slStationName: 'Jakobsberg',
  // Only show departures toward the city? Set to null for all.
  // Matches against destination text, e.g. 'Stockholm|Södertälje|Tumba'
  slDestinationFilter: null,
  // Night mode: clock-only, screen almost black
  nightStart: 22,   // 22:00
  nightEnd: 6,      // 06:00
  // RSS feeds (name shown, section groups them into columns)
  feeds: [
    { name: 'BBC', section: 'Världen', url: 'https://feeds.bbci.co.uk/news/world/rss.xml' },
    { name: 'SVT', section: 'Sverige · Stockholm', url: 'https://www.svt.se/nyheter/rss.xml' },
    { name: 'STHLM', section: 'Sverige · Stockholm', url: 'https://www.svt.se/nyheter/lokalt/stockholm/rss.xml' },
  ],
  maxPerSection: 4,
  // Electricity price area (Stockholm = SE3)
  elprisArea: 'SE3',
  // Show full session schedule when the race is this close
  f1WeekendWithinDays: 4,
  pitwallUrl: 'https://paivh.github.io/Pitwall/',
  corsProxy: 'https://api.allorigins.win/raw?url=',
  // refresh intervals (ms)
  weatherEvery: 15 * 60 * 1000,
  newsEvery: 15 * 60 * 1000,
  trainsEvery: 60 * 1000,
  elprisEvery: 30 * 60 * 1000,
  deviationsEvery: 5 * 60 * 1000,
  f1Every: 6 * 60 * 60 * 1000,
};

const $ = (id) => document.getElementById(id);
const pad = (n) => String(n).padStart(2, '0');

/* ---------- clock, date, night mode ---------- */

let sunTimes = null; // { sunrise: Date, sunset: Date }

function tickClock() {
  const now = new Date();
  $('clock').innerHTML = `${pad(now.getHours())}:${pad(now.getMinutes())}<span class="sec"> ${pad(now.getSeconds())}</span>`;
  $('date').textContent = now.toLocaleDateString('sv-SE', {
    weekday: 'long', day: 'numeric', month: 'long',
  });
  applyNightMode(now);
  paintSky(now);
}

function isNight(now) {
  const h = now.getHours();
  const { nightStart, nightEnd } = CONFIG;
  return nightStart > nightEnd
    ? (h >= nightStart || h < nightEnd)
    : (h >= nightStart && h < nightEnd);
}

let nightOverrideUntil = 0;

function applyNightMode(now) {
  const night = isNight(now) && Date.now() > nightOverrideUntil;
  document.body.classList.toggle('night', night);
}

// Tap anywhere at night to wake the full dashboard for 60 s
document.addEventListener('pointerdown', () => {
  nightOverrideUntil = Date.now() + 60 * 1000;
  applyNightMode(new Date());
});

/* ---------- sky: background follows the real sun ---------- */

function paintSky(now) {
  // Phase: minutes relative to sunrise/sunset, if known
  let top = '#0b0e14', bottom = '#0b0e14', glow = 'rgba(232,184,114,0)';
  if (sunTimes) {
    const t = now.getTime();
    const rise = sunTimes.sunrise.getTime();
    const set = sunTimes.sunset.getTime();
    const H = 60 * 60 * 1000;

    if (t > rise - H && t < rise + H) {
      // dawn: warm glow rises
      const p = (t - (rise - H)) / (2 * H); // 0..1
      glow = `rgba(232, 168, 110, ${(0.22 * Math.sin(p * Math.PI)).toFixed(3)})`;
      top = '#10131c';
      bottom = mix('#0b0e14', '#2a2030', Math.sin(p * Math.PI));
    } else if (t >= rise + H && t < set - H) {
      // day: cool, slightly lifted
      top = '#12161f';
      bottom = '#171c27';
    } else if (t >= set - H && t < set + H) {
      // dusk
      const p = (t - (set - H)) / (2 * H);
      glow = `rgba(214, 140, 100, ${(0.16 * Math.sin(p * Math.PI)).toFixed(3)})`;
      top = '#0e111a';
      bottom = mix('#0b0e14', '#241d29', Math.sin(p * Math.PI));
    }
  }
  const root = document.documentElement.style;
  root.setProperty('--bg-a', top);
  root.setProperty('--bg-b', bottom);
  root.setProperty('--glow', glow);
}

function mix(a, b, p) {
  const A = a.match(/\w\w/g).map((x) => parseInt(x, 16));
  const B = b.match(/\w\w/g).map((x) => parseInt(x, 16));
  return '#' + A.map((v, i) => pad(Math.round(v + (B[i] - v) * p).toString(16))).join('');
}

/* ---------- weather: Open-Meteo (no key) ---------- */

const WMO = {
  0: ['☀️', 'Klart'], 1: ['🌤️', 'Mest klart'], 2: ['⛅', 'Halvklart'], 3: ['☁️', 'Mulet'],
  45: ['🌫️', 'Dimma'], 48: ['🌫️', 'Frostdimma'],
  51: ['🌦️', 'Lätt duggregn'], 53: ['🌦️', 'Duggregn'], 55: ['🌧️', 'Tätt duggregn'],
  61: ['🌦️', 'Lätt regn'], 63: ['🌧️', 'Regn'], 65: ['🌧️', 'Kraftigt regn'],
  66: ['🌧️', 'Underkylt regn'], 67: ['🌧️', 'Underkylt regn'],
  71: ['🌨️', 'Lätt snö'], 73: ['🌨️', 'Snö'], 75: ['❄️', 'Kraftig snö'], 77: ['❄️', 'Snökorn'],
  80: ['🌦️', 'Regnskurar'], 81: ['🌧️', 'Regnskurar'], 82: ['⛈️', 'Kraftiga skurar'],
  85: ['🌨️', 'Snöbyar'], 86: ['🌨️', 'Snöbyar'],
  95: ['⛈️', 'Åska'], 96: ['⛈️', 'Åska med hagel'], 99: ['⛈️', 'Åska med hagel'],
};
const wmo = (c, when) => {
  const [icon, desc] = WMO[c] || ['🌡️', ''];
  if (isDarkAt(when) && c <= 2) {
    return [c === 2 ? '☁️' : '🌙', c === 0 ? 'Klart' : desc];
  }
  return [icon, desc];
};

// true if the sky is dark at time t (uses today's sunrise/sunset, shifted for tomorrow's small hours)
function isDarkAt(t) {
  if (!sunTimes || !t) return false;
  const ms = t instanceof Date ? t.getTime() : new Date(t).getTime();
  const day = 24 * 60 * 60 * 1000;
  for (const shift of [0, day]) {
    if (ms >= sunTimes.sunrise.getTime() + shift && ms <= sunTimes.sunset.getTime() + shift) return false;
  }
  return true;
}

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.lat}&longitude=${CONFIG.lon}`
      + `&current=temperature_2m,apparent_temperature,weather_code`
      + `&hourly=temperature_2m,weather_code,precipitation_probability`
      + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset`
      + `&timezone=Europe%2FStockholm&forecast_days=2`;
    const r = await fetch(url);
    const d = await r.json();

    sunTimes = {
      sunrise: new Date(d.daily.sunrise[0]),
      sunset: new Date(d.daily.sunset[0]),
    };

    const [icon, desc] = wmo(d.current.weather_code, new Date());
    $('wx-temp').textContent = `${Math.round(d.current.temperature_2m)}°`;
    $('wx-desc').textContent = `${icon} ${desc} · känns som ${Math.round(d.current.apparent_temperature)}°`;
    $('wx-hilo').textContent = `${Math.round(d.daily.temperature_2m_max[0])}° / ${Math.round(d.daily.temperature_2m_min[0])}°`;
    $('wx-rain').textContent = `${d.daily.precipitation_probability_max[0] ?? 0}%`;

    $('wx-sunrise').textContent = d.daily.sunrise[0].slice(11, 16);
    $('wx-sunset').textContent = d.daily.sunset[0].slice(11, 16);

    // next 5 hours (crosses midnight thanks to forecast_days=2)
    const nowT = Date.now();
    const idx = d.hourly.time.findIndex((t) => new Date(t).getTime() > nowT);
    const start = idx === -1 ? 0 : idx;
    const hoursEl = $('wx-hours');
    hoursEl.innerHTML = '';
    for (let i = start; i < Math.min(start + 5, d.hourly.time.length); i++) {
      const [hi] = wmo(d.hourly.weather_code[i], d.hourly.time[i]);
      const el = document.createElement('div');
      el.className = 'hour';
      el.innerHTML = `<div class="h">${d.hourly.time[i].slice(11, 16)}</div>`
        + `<div class="i">${hi}</div>`
        + `<div class="t">${Math.round(d.hourly.temperature_2m[i])}°</div>`;
      hoursEl.appendChild(el);
    }
    stamp();
  } catch (e) {
    $('wx-desc').textContent = 'Väder otillgängligt';
  }
}

/* ---------- SL pendeltåg (open Transport API, no key) ---------- */

async function slFetch(path) {
  const base = 'https://transport.integration.sl.se/v1';
  try {
    const r = await fetch(base + path);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch (e) {
    // some browsers/networks block it — retry via CORS proxy
    const r = await fetch(CONFIG.corsProxy + encodeURIComponent(base + path));
    return await r.json();
  }
}

async function findSiteId() {
  const cached = localStorage.getItem('gryning.siteId');
  if (cached) return cached;
  const sites = await slFetch('/sites?expand=false');
  const hit = sites.find((s) => s.name && s.name.toLowerCase() === CONFIG.slStationName.toLowerCase())
    || sites.find((s) => s.name && s.name.toLowerCase().includes(CONFIG.slStationName.toLowerCase()));
  if (!hit) throw new Error('station not found');
  localStorage.setItem('gryning.siteId', hit.id);
  return hit.id;
}

async function loadTrains() {
  try {
    const siteId = await findSiteId();
    const d = await slFetch(`/sites/${siteId}/departures?transport=TRAIN&forecast=60`);
    let deps = d.departures || [];
    if (CONFIG.slDestinationFilter) {
      const re = new RegExp(CONFIG.slDestinationFilter, 'i');
      deps = deps.filter((x) => re.test(x.destination || ''));
    }
    deps = deps.slice(0, 4);
    const list = $('train-list');
    list.innerHTML = '';
    if (!deps.length) {
      list.innerHTML = '<div class="dep"><span class="dest">Inga avgångar just nu</span></div>';
      return;
    }
    for (const x of deps) {
      const el = document.createElement('div');
      el.className = 'dep';
      const disp = x.display || (x.expected || x.scheduled || '').slice(11, 16);
      const soon = /min|nu/i.test(disp);
      el.innerHTML = `<span class="when ${soon ? '' : 'later'}">${disp}</span>`
        + `<span class="dest">${x.destination || ''}</span>`
        + `<span class="line-badge">${(x.line && x.line.designation) || 'J'}</span>`;
      list.appendChild(el);
    }
    stamp();
  } catch (e) {
    $('train-list').innerHTML = '<div class="dep"><span class="dest">SL otillgängligt just nu</span></div>';
  }
}

/* ---------- news via RSS ---------- */

async function fetchFeed(feed) {
  // 1) rss2json — returns parsed JSON, most reliable
  try {
    const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feed.url));
    const d = await r.json();
    if (d.items && d.items.length) {
      return d.items.slice(0, 4).map((i) => ({
        src: feed.name, section: feed.section, title: i.title, date: new Date(i.pubDate),
        desc: stripHtml(i.description || '').slice(0, 500), link: i.link || '',
      }));
    }
  } catch (e) { /* try next */ }
  // 2) raw XML through CORS proxies
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
  ];
  for (const p of proxies) {
    try {
      const r = await fetch(p + encodeURIComponent(feed.url));
      const text = await r.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const nodes = [...xml.querySelectorAll('item')].slice(0, 4);
      if (nodes.length) {
        return nodes.map((n) => ({
          src: feed.name,
          section: feed.section,
          title: n.querySelector('title')?.textContent?.trim() || '',
          date: new Date(n.querySelector('pubDate')?.textContent || 0),
          desc: stripHtml(n.querySelector('description')?.textContent || '').slice(0, 500),
          link: n.querySelector('link')?.textContent?.trim() || '',
        }));
      }
    } catch (e) { /* try next proxy */ }
  }
  return [];
}

// inert HTML-to-text: DOMParser never executes scripts or loads resources
function stripHtml(s) {
  return new DOMParser().parseFromString(s || '', 'text/html').body.textContent.replace(/\s+/g, ' ').trim();
}

let newsRetryTimer = null;

function interleave(items, max) {
  items.sort((a, b) => b.date - a.date);
  const bySrc = {};
  items.forEach((i) => (bySrc[i.src] ||= []).push(i));
  const order = Object.values(bySrc);
  const mixed = [];
  for (let i = 0; mixed.length < max; i++) {
    let added = false;
    for (const arr of order) {
      if (arr[i]) { mixed.push(arr[i]); added = true; }
      if (mixed.length >= max) break;
    }
    if (!added) break;
  }
  return mixed;
}

async function loadNews() {
  let items = [];

  // 0) same-origin news.json, written by the GitHub Action — no CORS, works everywhere
  try {
    const r = await fetch('news.json?t=' + Date.now());
    if (r.ok) {
      const d = await r.json();
      items = (d.items || []).map((i) => ({
        src: i.src, section: i.section || 'Nyheter', title: i.title, date: new Date(i.date),
        desc: i.desc || '', link: i.link || '',
      }));
    }
  } catch (e) { /* fall through to live fetch */ }

  // 1) live RSS via proxies (fallback if news.json missing or empty)
  if (!items.length) {
    const perFeed = await Promise.all(CONFIG.feeds.map(fetchFeed));
    items = perFeed.flat();
  }
  if (!items.length) {
    $('news-sections').innerHTML = '<div class="headline"><span class="txt">Nyheter otillgängliga · försöker igen strax</span></div>';
    clearTimeout(newsRetryTimer);
    newsRetryTimer = setTimeout(loadNews, 90 * 1000);
    return;
  }

  // group by section, keep CONFIG order
  const sectionOrder = [...new Set(CONFIG.feeds.map((f) => f.section))];
  const bySection = {};
  items.forEach((i) => (bySection[i.section] ||= []).push(i));

  const container = $('news-sections');
  container.innerHTML = '';
  for (const name of sectionOrder) {
    if (!bySection[name]) continue;
    const col = document.createElement('div');
    col.className = 'news-col';
    col.innerHTML = `<h3>${name}</h3>`;
    for (const it of interleave(bySection[name], CONFIG.maxPerSection)) {
      const el = document.createElement('div');
      el.className = 'headline';
      el.innerHTML = `<span class="src">${it.src}</span><span class="txt"></span>`;
      el.querySelector('.txt').textContent = it.title;
      el.addEventListener('click', (e) => { e.stopPropagation(); openArticle(it); });
      col.appendChild(el);
    }
    container.appendChild(col);
  }
  stamp();
}

/* ---------- article popup ---------- */

let modalTimer = null;

function openArticle(it) {
  $('m-src').textContent = `${it.src} · ${it.date.toLocaleString('sv-SE', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' })}`;
  $('m-title').textContent = it.title;
  $('m-desc').textContent = it.desc || 'Ingen sammanfattning i flödet — öppna artikeln för mer.';
  const a = $('m-link');
  if (it.link) { a.href = it.link; a.classList.remove('hidden'); }
  else { a.classList.add('hidden'); }
  $('modal').classList.add('open');
  clearTimeout(modalTimer);
  modalTimer = setTimeout(closeModal, 90 * 1000); // kiosk: never stay stuck open
}

function closeModal() {
  $('modal').classList.remove('open');
  clearTimeout(modalTimer);
}

$('m-close').addEventListener('click', closeModal);
$('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });

/* ---------- elpris: elprisetjustnu.se (no key) ---------- */

async function elFetch(day) {
  const url = `https://www.elprisetjustnu.se/api/v1/prices/${day.getFullYear()}/${pad(day.getMonth() + 1)}-${pad(day.getDate())}_${CONFIG.elprisArea}.json`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch (e) {
    try {
      const r = await fetch(CONFIG.corsProxy + encodeURIComponent(url));
      if (!r.ok) throw new Error(r.status);
      return await r.json();
    } catch (e2) { return []; } // tomorrow's prices 404 until ~13:00 — that's fine
  }
}

async function loadElpris() {
  try {
    const now = new Date();
    const [today, tomorrow] = await Promise.all([
      elFetch(now), elFetch(new Date(now.getTime() + 86400000)),
    ]);
    const all = [...today, ...tomorrow].map((p) => ({
      start: new Date(p.time_start), end: new Date(p.time_end), ore: p.SEK_per_kWh * 100,
    }));
    if (!all.length) { $('elpris').classList.add('hidden'); return; }
    $('elpris').classList.remove('hidden');

    const cur = all.find((p) => p.start <= now && now < p.end) || all[0];
    $('el-now').innerHTML = `${cur.ore.toFixed(0)}<span class="unit"> öre/kWh</span>`;

    // upcoming prices, averaged per hour (handles both hourly and 15-min data)
    const byHour = new Map();
    for (const p of all.filter((p) => p.end > now)) {
      const k = `${p.start.toDateString()}-${p.start.getHours()}`;
      if (!byHour.has(k)) byHour.set(k, { start: p.start, vals: [] });
      byHour.get(k).vals.push(p.ore);
    }
    const hours = [...byHour.values()].slice(0, 12)
      .map((h) => ({ start: h.start, ore: h.vals.reduce((a, b) => a + b, 0) / h.vals.length }));
    if (!hours.length) return;

    const lo = Math.min(0, ...hours.map((h) => h.ore));
    const hi = Math.max(...hours.map((h) => h.ore), lo + 1);
    const cheapest = hours.reduce((a, b) => (a.ore <= b.ore ? a : b));

    const bars = $('el-bars');
    bars.innerHTML = '';
    hours.forEach((h, i) => {
      const el = document.createElement('div');
      el.className = 'el-bar' + (i === 0 ? ' now' : '') + (h === cheapest && i !== 0 ? ' cheap' : '');
      el.style.height = `${Math.max(6, ((h.ore - lo) / (hi - lo)) * 100)}%`;
      el.title = `${pad(h.start.getHours())}:00 · ${h.ore.toFixed(0)} öre`;
      bars.appendChild(el);
    });

    $('el-hint').innerHTML = `billigast <b>${pad(cheapest.start.getHours())}:00 · ${cheapest.ore.toFixed(0)} öre</b> · kommande 12 h`;
    stamp();
  } catch (e) {
    $('elpris').classList.add('hidden');
  }
}

/* ---------- SL deviations (open API, no key) ---------- */

async function loadDeviations() {
  try {
    const siteId = await findSiteId();
    const url = `https://deviations.integration.sl.se/v1/messages?future=true&site=${siteId}`;
    let d;
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(r.status);
      d = await r.json();
    } catch (e) {
      const r = await fetch(CONFIG.corsProxy + encodeURIComponent(url));
      d = await r.json();
    }
    const box = $('train-deviations');
    box.innerHTML = '';
    const seen = new Set();
    for (const m of (Array.isArray(d) ? d : [])) {
      const v = (m.message_variants || []).find((x) => x.language === 'sv') || (m.message_variants || [])[0];
      const header = v && v.header && v.header.trim();
      if (!header || seen.has(header)) continue;
      seen.add(header);
      const el = document.createElement('div');
      el.className = 'deviation';
      el.textContent = header;
      box.appendChild(el);
      if (seen.size >= 2) break;
    }
  } catch (e) { /* no deviations shown is fine */ }
}

/* ---------- F1 next race (Jolpica / Ergast) ---------- */

const F1_SESSIONS = [
  ['FirstPractice', 'FP1'], ['SecondPractice', 'FP2'], ['ThirdPractice', 'FP3'],
  ['SprintQualifying', 'Sprintkval'], ['Sprint', 'Sprint'], ['Qualifying', 'Kval'],
];

async function loadF1() {
  try {
    const r = await fetch('https://api.jolpi.ca/ergast/f1/current.json?limit=30');
    const d = await r.json();
    const races = d.MRData.RaceTable.Races;
    const now = Date.now();
    // keep the current race on screen until ~3h after lights out
    const next = races.find((x) => new Date(`${x.date}T${x.time || '12:00:00Z'}`).getTime() + 3 * 3600e3 > now);
    if (!next) { $('f1-body').textContent = 'Säsongen är slut 🏁'; return; }

    const raceStart = new Date(`${next.date}T${next.time || '12:00:00Z'}`);
    const days = Math.ceil((raceStart - now) / 86400000);

    if (days <= CONFIG.f1WeekendWithinDays) {
      // race weekend: full session schedule in local time
      const sessions = [];
      for (const [key, label] of F1_SESSIONS) {
        if (next[key] && next[key].date) {
          sessions.push({ label, t: new Date(`${next[key].date}T${next[key].time || '12:00:00Z'}`) });
        }
      }
      sessions.push({ label: 'Race 🏁', t: raceStart });
      sessions.sort((a, b) => a.t - b.t);
      const upNext = sessions.find((s) => s.t.getTime() > now);

      let html = `<div class="race">${next.raceName}</div>`
        + `<div class="sub">${next.Circuit.circuitName}</div>`;
      for (const s of sessions) {
        const cls = s.t.getTime() < now ? 'past' : (s === upNext ? 'next' : '');
        html += `<div class="f1-session ${cls}"><span>${s.label}</span>`
          + `<span class="st">${s.t.toLocaleDateString('sv-SE', { weekday: 'short' })} ${s.t.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' })}</span></div>`;
      }
      html += `<a class="pitwall" href="${CONFIG.pitwallUrl}">Öppna Pitwall ↗</a>`;
      $('f1-body').innerHTML = html;
    } else {
      const when = days === 1 ? 'imorgon' : `om <span class="count">${days} dagar</span>`;
      $('f1-body').innerHTML = `<div class="race">${next.raceName}</div>`
        + `<div>${when}</div>`
        + `<div class="sub">${next.Circuit.circuitName} · ${raceStart.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' })} ${raceStart.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' })}</div>`;
    }
    stamp();
  } catch (e) {
    $('f1').classList.add('hidden');
  }
}

  $('updated').textContent = 'uppdaterad ' + new Date().toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
