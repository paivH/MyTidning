# .github/workflows/news.yml
name: Fetch news

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min (GitHub may delay a few minutes)
  workflow_dispatch:          # manual run button in the Actions tab

permissions:
  contents: write

concurrency:
  group: news
  cancel-in-progress: true

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch feeds
        run: node scripts/fetch-news.mjs

      - name: Commit if changed
        run: |
          git config user.name "gryning-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "news: update headlines"
          # retry push with rebase in case another workflow pushed first
          for i in 1 2 3 4 5; do
            git push && break
            echo "push $i rejected, rebasing…"
            git pull --rebase --autostash origin main
            sleep $((RANDOM % 5 + 1))
          done
