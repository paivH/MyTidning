# .github/workflows/deals.yml
name: Barkarby deals

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC ≈ 06:00 Swedish summer time
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deals
  cancel-in-progress: true

jobs:
  deals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Find deals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/deals.mjs
      - name: Commit if changed
        run: |
          git config user.name "gryning-bot"
          git config user.email "actions@users.noreply.github.com"
          git add deals.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "deals: update Barkarby offers"
          git push
